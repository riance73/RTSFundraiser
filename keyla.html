<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. Body centers the card and sets a soft background */
        body { 
            background-color: #fff0f5; /* LavenderBlush (very light pink) */
            font-family: sans-serif; 
            margin: 0;
            padding: 40px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }

        /* 2. The Card Shape */
        main {
            background-color: white;   /* The white card container */
            max-width: 700px; 
            width: 100%;
            padding: 40px;             
            border-radius: 20px;       
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            box-sizing: border-box;
        }

        /* Student's specific styles preserved */
        h1 { 
            font-weight: bold; 
            color: black; 
            background-color: lightpink; 
            padding: 10px;
            border-radius: 8px;
            margin-top: 0; /* Keeps it snug to the top of the card */
        }

        h2 {
            color: #800080; /* Purple to match her back button */
            border-bottom: 2px solid lightpink;
            padding-bottom: 5px;
        }

        p { 
            color: deeppink; 
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* The Back Button */
        .back-btn { 
            align-self: flex-start; /* Keeps the button on the left */
            margin-bottom: 20px; 
            padding: 10px 15px; 
            background: #800080; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Main Page</a>

    <main>
        <h1>Who am I?</h1>
        <p>Hello my name is keyla and i was mentally not in the right head space...</p>
        
        <h2>what does rts mean to me?</h2>
        <p>Rts is special to me because it has helped me succeed...</p>
    </main>

</body>
</html>
