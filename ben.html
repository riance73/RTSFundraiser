<!DOCTYPE html>
<html>
<head>
  <style>
    /* 1. Body centers the card and keeps the student's grey background */
    body { 
      background-color: grey; 
      font-family: fantasy, serif; 
      margin: 0;
      padding: 40px 20px; 
      display: flex;
      flex-direction: column;
      align-items: center; 
      min-height: 100vh;
    }

    /* 2. The Card Shape */
    main {
      background-color: white;   /* The white card container */
      max-width: 700px; 
      width: 100%;
      padding: 40px;             
      border-radius: 15px;       
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); 
      box-sizing: border-box;
      text-align: center;        /* Keeps the student's centered layout */
    }

    /* Student's specific styles adjusted for the white card */
    p { 
      color: #2f4f4f; /* darkslategray for readability on white */
      font-style: italic; 
      font-size: 18px; 
      line-height: 1.6;
    }

    h3, h4, h2 { 
      color: #333; /* Darker color for headings on the white background */
      margin-top: 0; 
    }

    img { 
      max-width: 100%; 
      height: auto;
      border: 2px solid grey; 
      border-radius: 8px;
      margin-top: 20px;
    }

    .back-link {
      align-self: flex-start; /* Keeps the link on the left outside the card */
      margin-bottom: 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← Back to Main Page</a>

  <main>
    <h3>Who am I?</h3>
    <p>I am a student at RTS trying to get on track...</p>
    
    <img src="https://res.cloudinary.com/mybobs/image/upload/q_auto,f_auto,w_2880/20087177_gallery_01_wide" alt="grey couch">
  </main>

</body>
</html>

</body>
</html>
