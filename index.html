<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Fundraising Page</title>
    <style>
        body {
            font-family: fantasy, serif;
            color: #00008B;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            font-size: 3em;
            margin-bottom: 40px;
        }

        .page-grid {
            display: table;
            width: 100%;
        }

        .student-col {
            display: table-cell;
            width: 65%;
            vertical-align: top;
            border: 6px solid #800080; /* Purple Border */
            border-radius: 20px;
            padding: 20px;
        }

        .therm-col {
            display: table-cell;
            width: 35%;
            vertical-align: top;
            text-align: center;
        }

        .btn-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .student-btn {
            background-color: #800080; /* Purple */
            color: #ffffff !important; /* White Text */
            text-decoration: none;
            width: 40%;
            padding: 15px 0;
            text-align: center;
            border-radius: 10px;
            font-size: 1.2em;
            display: block;
        }

        .student-btn:hover {
            filter: brightness(1.2);
        }

        /* Thermometer Logic */
        .thermometer-wrapper {
            position: relative;
            height: 500px;
            width: 150px;
            margin: 0 auto;
        }

        .tube {
            position: absolute;
            right: 20px;
            width: 60px;
            height: 500px;
            border: 4px solid #000000;
            border-radius: 30px 30px 0 0;
            background: #ffeaea linear-gradient(to bottom, transparent 98%, #000000 98%);
            background-size: 100% 41.66px; 
            display: flex;
            flex-direction: column-reverse;
        }

        .mercury {
            width: 100%;
            height: 0%; 
            background-color: #FF0000;
            border-radius: 25px 25px 0 0;
        }

        .bulb {
            position: absolute;
            bottom: -40px;
            right: 0px;
            width: 100px;
            height: 100px;
            background-color: #FF0000;
            border: 4px solid #000000;
            border-radius: 50%;
            z-index: 5;
        }

        .label-stack {
            position: absolute;
            left: 0;
            top: 0;
            height: 500px;
            width: 60px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            font-weight: bold;
        }

        .stats {
            margin-top: 80px;
            font-size: 1.5em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RTS (Road To Success)</h1>

        <div class="page-grid">
            <div class="student-col">
                <h2 style="text-align: center; margin-top: 0;">Meet Our Students</h2>
                <div class="btn-container">
                    <a href="wil.html" class="student-btn">Wil</a>
                    <a href="keyla.html" class="student-btn">Keyla</a>
                    <a href="ben.html" class="student-btn">Ben</a>
                    <a href="ty.html" class="student-btn">Ty</a>
                    <a href="davdiel.html" class="student-btn">Davdiel</a>
                    <a href="elijah.html" class="student-btn">Elijah</a>
                    <a href="diego.html" class="student-btn">Diego</a>
                    <a href="mario.html" class="student-btn">Mario</a>
                    <a href="sam.html" class="student-btn">Sam</a>
                    <a href="gio.html" class="student-btn">Gio</a>
                    <a href="katie.html" class="student-btn">Katie</a>
                    <a href="danmarys.html" class="student-btn">Danmarys</a>
                </div>
            </div>

            <div class="therm-col">
                <div class="thermometer-wrapper">
                    <div class="label-stack">
                        <span>$0</span><span>$500</span><span>$1000</span><span>$1500</span>
                        <span>$2000</span><span>$2500</span><span>$3000</span><span>$3500</span>
                        <span>$4000</span><span>$4500</span><span>$5000</span><span>$5500</span><span>$6000</span>
                    </div>
                    <div class="tube"><div class="mercury"></div></div>
                    <div class="bulb"></div>
                </div>
                <div class="stats">Goal: $6,000<br>Raised: $0</div>
            </div>
        </div>
    </div>
</body>
</html>
