<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Fundraising Page</title>
    <style>
        body {
            /* Font: Fantasy | Color: Dark Blue */
            font-family: fantasy, serif;
            color: #00008B;
            background-color: #fcfcfc;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            font-size: 40px;
        }

        /* Layout Table - Highly Stable */
        .layout-table {
            width: 100%;
            border-collapse: collapse;
        }

        .left-column {
            width: 70%;
            vertical-align: top;
            padding: 20px;
            /* Purple Border around student section */
            border: 5px solid #800080;
            border-radius: 15px;
        }

        .right-column {
            width: 30%;
            vertical-align: top;
            padding: 20px;
            text-align: center;
        }

        /* Student Grid */
        .student-grid {
            display: block;
            text-align: center;
        }

        .student-link {
            display: inline-block;
            width: 40%;
            margin: 10px;
            padding: 20px 0;
            background-color: #800080; /* Purple */
            color: #ffffff !important; /* White Text */
            text-decoration: none;
            font-size: 20px;
            border-radius: 10px;
            text-align: center;
        }

        /* Thermometer Graphics */
        .therm-tube {
            width: 50px;
            height: 500px;
            background-color: #ffeaea;
            border: 3px solid #000000;
            margin: 0 auto;
            position: relative;
            border-radius: 25px 25px 0 0;
        }

        .mercury {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%; /* Starting at $0 */
            background-color: #FF0000; /* Red */
            border-radius: 20px 20px 0 0;
        }

        .bulb {
            width: 100px;
            height: 100px;
            background-color: #FF0000;
            border: 3px solid #000000;
            border-radius: 50%;
            margin: -50px auto 0 auto;
        }

        /* Tick Marks */
        .tick {
            position: absolute;
            left: -55px;
            width: 50px;
            text-align: right;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>RTS (Road To Success) Fundraising Page</h1>

        <table class="layout-table">
            <tr>
                <td class="left-column">
                    <h2 style="text-align: center;">Meet Our Students</h2>
                    <div class="student-grid">
                        <a href="student1.html" class="student-link">Student 1</a>
                        <a href="student2.html" class="student-link">Student 2</a>
                        <a href="student3.html" class="student-link">Student 3</a>
                        <a href="student4.html" class="student-link">Student 4</a>
                        <a href="student5.html" class="student-link">Student 5</a>
                        <a href="student6.html" class="student-link">Student 6</a>
                        <a href="student7.html" class="student-link">Student 7</a>
                        <a href="student8.html" class="student-link">Student 8</a>
                        <a href="student9.html" class="student-link">Student 9</a>
                        <a href="student10.html" class="student-link">Student 10</a>
                        <a href="student11.html" class="student-link">Student 11</a>
                        <a href="student12.html" class="student-link">Student 12</a>
                    </div>
                </td>

                <td class="right-column">
                    <div class="therm-tube">
                        <div class="tick" style="bottom: 100%;">$6000 —</div>
                        <div class="tick" style="bottom: 83.3%;">$5000 —</div>
                        <div class="tick" style="bottom: 66.6%;">$4000 —</div>
                        <div class="tick" style="bottom: 50%;">$3000 —</div>
                        <div class="tick" style="bottom: 33.3%;">$2000 —</div>
                        <div class="tick" style="bottom: 16.6%;">$1000 —</div>
                        <div class="tick" style="bottom: 0%;">$0 —</div>
                        
                        <div class="mercury"></div>
                    </div>
                    <div class="bulb"></div>
                    <div style="margin-top: 50px; font-size: 24px; font-weight: bold;">
                        Raised: $0
                    </div>
                </td>
            </tr>
        </table>
    </div>

</body>
</html>
