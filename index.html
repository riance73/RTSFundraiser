<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTS Fundraising Page</title>
    <style>
        /* General Page Settings */
        body {
            font-family: fantasy, "Papyrus", "Copperplate", serif;
            color: #00008B; /* Dark Blue */
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            line-height: 1.15;
        }

        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 50px;
        }

        /* Layout Columns */
        .content-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 50px;
            flex-wrap: wrap;
        }

        /* Student Section - Left */
        .student-sidebar {
            flex: 1;
            min-width: 350px;
            border: 5px solid #800080; /* Purple Border */
            padding: 20px;
            border-radius: 12px;
        }

        .student-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .student-link {
            display: block;
            background-color: #800080; /* Purple Button */
            color: #ffffff !important; /* White Text */
            text-decoration: none;
            padding: 15px 5px;
            text-align: center;
            border-radius: 8px;
            font-size: 1.1em;
            border: none;
        }

        .student-link:hover {
            opacity: 0.9;
            text-decoration: underline;
        }

        /* Thermometer Section - Right */
        .thermometer-box {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .tube {
            width: 50px;
            height: 500px;
            background-color: #e0e0e0;
            border: 3px solid #000000;
            border-radius: 25px 25px 0 0;
            position: relative;
            display: flex;
            flex-direction: column-reverse;
        }

        .mercury-fill {
            width: 100%;
            height: 0%; /* Start at $0 */
            background-color: #FF0000; /* Red */
            border-radius: 20px 20px 0 0;
        }

        .bulb-base {
            width: 90px;
            height: 90px;
            background-color: #FF0000;
            border: 3px solid #000000;
            border-radius: 50%;
            margin-top: -45px;
            z-index: 2;
        }

        /* Tick Marks and Labels */
        .labels-container {
            position: absolute;
            left: -70px;
            height: 500px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            align-items: flex-end;
            width: 60px;
        }

        .tick-wrapper {
            display: flex;
            align-items: center;
            font-weight: bold;
            height: 0;
        }

        .black-line {
            width: 12px;
            height: 3px;
            background-color: #000000;
            margin-left: 8px;
        }

        .stats-display {
            text-align: center;
            margin-top: 60px;
            font-size: 1.3em;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>RTS (Road To Success) Fundraising Page</h1>

        <div class="content-flex">
            <div class="student-sidebar">
                <h2 style="text-align: center; margin-top: 0;">Meet Our 12 Students</h2>
                <div class="student-grid">
                    <a href="student1.html" class="student-link">Student 1</a>
                    <a href="student2.html" class="student-link">Student 2</a>
                    <a href="student3.html" class="student-link">Student 3</a>
                    <a href="student4.html" class="student-link">Student 4</a>
                    <a href="student5.html" class="student-link">Student 5</a>
                    <a href="student6.html" class="student-link">Student 6</a>
                    <a href="student7.html" class="student-link">Student 7</a>
                    <a href="student8.html" class="student-link">Student 8</a>
                    <a href="student9.html" class="student-link">Student 9</a>
                    <a href="student10.html" class="student-link">Student 10</a>
                    <a href="student11.html" class="student-link">Student 11</a>
                    <a href="student12.html" class="student-link">Student 12</a>
                </div>
            </div>

            <div class="thermometer-box">
                <div class="tube">
                    <div class="labels-container">
                        <div class="tick-wrapper">$0 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$500 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$1000 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$1500 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$2000 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$2500 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$3000 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$3500 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$4000 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$4500 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$5000 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$5500 <div class="black-line"></div></div>
                        <div class="tick-wrapper">$6000 <div class="black-line"></div></div>
                    </div>
                    <div class="mercury-fill"></div>
                </div>
                <div class="bulb-base"></div>

                <div class="stats-display">
                    Goal: $6,000<br>
                    Current: $0
                </div>
            </div>
        </div>
    </div>

</body>
</html>
