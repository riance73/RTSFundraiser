<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. Body centers the card and sets a soft background */
        body { 
            background-color: #fff0f5; /* LavenderBlush (very light pink) */
            font-family: sans-serif; 
            margin: 0;
            padding: 40px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }

        /* 2. The Card Shape */
        main {
            background-color: white;   /* The white card container */
            max-width: 700px; 
            width: 100%;
            padding: 40px;             
            border-radius: 20px;       
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            box-sizing: border-box;
        }

        /* Student's specific styles preserved */
        h1 { 
            font-weight: bold; 
            color: black; 
            background-color: lightpink; 
            padding: 10px;
            border-radius: 8px;
            margin-top: 0; 
            text-align: left;
        }

        h2 {
            color: #800080; 
            border-bottom: 2px solid lightpink;
            padding-bottom: 5px;
            text-align: left;
        }

        p { 
            color: deeppink; 
            font-size: 1.1rem;
            line-height: 1.6;
            text-align: left;
        }

        /* Rug Image Style - Now 50% smaller and centered */
        img {
            width: 50%; /* Reduced size by 50% */
            height: auto;
            display: block;
            margin: 20px auto 0 auto; /* Added margin to top, centered horizontally */
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        /* The Back Button */
        .back-btn { 
            align-self: flex-start; 
            margin-bottom: 20px; 
            padding: 10px 15px; 
            background: #800080; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Main Page</a>

    <main>
        <h1>Who am I?</h1>
        <p>Hello my name is keyla and i was mentally not in the right head space...</p>
        
        <h2>what does rts mean to me?</h2>
        <p>Rts is special to me because it has helped me succeed...</p>

        <img src="https://images.rugimg.com/pink-round-boho-rug/3188581/3188581_main.jpg?width=1555&height=2000&fit=bounds&quality=55" alt="Pink Boho Rug">
    </main>

</body>
</html>
