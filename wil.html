<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. Body centers the card and keeps the student's yellow background */
        body { 
            background-color: yellow; 
            font-family: Arial, sans-serif; 
            margin: 0;
            padding: 40px 20px; 
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
        }

        /* 2. The Card Shape */
        main {
            background-color: white;   /* The white card container */
            max-width: 700px; 
            width: 100%;
            padding: 40px;             
            border-radius: 15px;       
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); 
            box-sizing: border-box;
        }

        /* Student's specific styles preserved */
        h2, h3 { 
            color: #333; 
            font-weight: bold; 
            margin-top: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }

        h2:first-child { margin-top: 0; } /* Keeps the first title at the top */

        p { 
            color: blueviolet; 
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* The Back Button */
        .back-btn { 
            align-self: flex-start; /* Keeps the button on the left outside the card */
            margin-bottom: 20px; 
            padding: 10px 15px; 
            background: #800080; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Main Page</a>

    <main>
        <h2>Who am I?</h2>
        <p>My name is Wil and I am a resident of Boston, Massachusetts...</p>
        
        <h3>What does RTS mean to me?</h3>
        <p>RTS is an opportunity for me to gain back credits...</p>
        
        <h3>Why does this project matter?</h3>
        <p>This project is a good way to connect with classmates...</p>
    </main>

</body>
</html>
